services:
  postgres:
    # P0-X: pin TimescaleDB to the exact tag we tested with
    # (latest-pg16 resolved to 2.26.4-pg16 on 2026-04-28). Bump
    # deliberately and re-run the schema migration tests.
    image: timescale/timescaledb:2.26.4-pg16
    container_name: tradebot-postgres
    restart: unless-stopped
    mem_limit: 2g
    memswap_limit: 2g
    shm_size: 256m
    # Port 5434 to avoid conflicting with ModelForge's mf-postgres on 5433.
    # P0-V: bind to loopback only — nothing on the LAN should reach Postgres.
    ports:
      - "127.0.0.1:5434:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-tradebot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tradebot-change-me}
      - POSTGRES_DB=${POSTGRES_DB:-tradebot}
      - TIMESCALEDB_TELEMETRY=off
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # init.d runs once on first startup — creates the freqtrade DB and
      # enables the timescaledb extension on both DBs.
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tradebot} -d ${POSTGRES_DB:-tradebot}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  freqtrade:
    build:
      context: .
      dockerfile: Dockerfile.freqtrade
    image: trading-bot/freqtrade:local
    container_name: freqtrade
    restart: unless-stopped
    mem_limit: 32g
    memswap_limit: 32g
    shm_size: 2g
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./user_data:/freqtrade/user_data
      # Operator scripts (entrypoint loader, etc) — read-only.
      - ./scripts:/freqtrade/scripts:ro
      # Drop your Coinbase JSON key here (e.g. ./secrets/coinbase.json).
      # Read-only so the container cannot rewrite it.
      - ./secrets:/run/secrets/trading-bot:ro
    # P0-V: freqtrade REST API + websocket on loopback only.
    ports:
      - "127.0.0.1:8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CRYPTOQUANT_API_KEY=${CRYPTOQUANT_API_KEY:-}
      - WHALE_ALERT_API_KEY=${WHALE_ALERT_API_KEY:-}
      - GLASSNODE_API_KEY=${GLASSNODE_API_KEY:-}
      - BITCOIN_DATA_API_KEY=${BITCOIN_DATA_API_KEY:-}
      # All AI sentiment scoring runs locally via Ollama — no external API costs.
      # The dual-Hermes-3 trust-the-majority pattern uses both models in parallel.
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_MODEL_FAST=${OLLAMA_MODEL_FAST:-hermes3:8b}
      - OLLAMA_MODEL_DEEP=${OLLAMA_MODEL_DEEP:-hermes3:70b}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - PERPLEXITY_MODEL=${PERPLEXITY_MODEL:-sonar}
      - PERPLEXITY_RECENCY=${PERPLEXITY_RECENCY:-hour}
      # NOTE: DATABASE_URL + FREQTRADE_DB_URL are intentionally NOT inlined
      # here — passwords with special chars (e.g. '@') break URL parsing.
      # freqtrade_entrypoint.py builds them from POSTGRES_* below using
      # urllib.parse.quote_plus on the password.
      # InfluxDB writer was retired 2026-05-12 (no consumer; Grafana removed).
      # The metrics_writer still imports influxdb_client opportunistically;
      # INFLUX_ENABLED=0 keeps it strictly no-op.
      - INFLUX_ENABLED=0
      # Recommended: drop the JSON key Coinbase emits at ./secrets/coinbase.json.
      # The freqtrade_entrypoint.py script reads it on container start and
      # exports FREQTRADE__EXCHANGE__KEY / FREQTRADE__EXCHANGE__SECRET so the
      # placeholders in config.json get overridden at runtime.
      - COINBASE_KEY_FILE=${COINBASE_KEY_FILE:-/run/secrets/trading-bot/coinbase.json}
      # Fallback for the legacy env-var auth path (skipped when the JSON file is present).
      - COINBASE_API_KEY=${COINBASE_API_KEY:-}
      - COINBASE_API_SECRET=${COINBASE_API_SECRET:-}
      # FREQTRADE__SECTION__KEY env vars override config.json at startup.
      # All secrets live in .env; config.json stays commit-safe with sentinels.
      - FREQTRADE__API_SERVER__USERNAME=${FREQTRADE_API_USER:-freqtrader}
      - FREQTRADE__API_SERVER__PASSWORD=${FREQTRADE_API_PASS:?FREQTRADE_API_PASS required}
      - FREQTRADE__API_SERVER__JWT_SECRET_KEY=${FREQTRADE_JWT_SECRET:?FREQTRADE_JWT_SECRET required}
      - FREQTRADE__API_SERVER__WS_TOKEN=${FREQTRADE_WS_TOKEN:?FREQTRADE_WS_TOKEN required}
      # FREQTRADE__DB_URL + DATABASE_URL are built by freqtrade_entrypoint.py
      # from POSTGRES_USER/PASSWORD/DB with URL-encoding, so special chars
      # like '@' in the password don't corrupt the DSN.
      - POSTGRES_USER=${POSTGRES_USER:-tradebot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      - POSTGRES_DB=${POSTGRES_DB:-tradebot}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://127.0.0.1:8080/api/v1/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # Override the image's default entrypoint (which is the freqtrade binary)
    # so we can inject Coinbase credentials from secrets/coinbase.json into
    # FREQTRADE__EXCHANGE__KEY / __SECRET env vars before exec'ing freqtrade.
    entrypoint: ["python3", "/freqtrade/scripts/freqtrade_entrypoint.py"]
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --config /freqtrade/user_data/config.json
      --config /freqtrade/user_data/config-private.json
      --strategy FreqAIMeanRevV1

  # ── NostalgiaForInfinity X6 (PROFILED OFF) ────────────────────────────
  # Second freqtrade container running NFI X6 alongside the main strategy.
  # OFF by default — `docker compose up` will NOT start this. Activate
  # with:
  #     docker compose --profile nfi up -d freqtrade-nfi
  #
  # Activation gates (see docs/NFI_X6_ACTIVATION_2026-05-11.md):
  #   1. Strategy file byte-identical to upstream iterativv/NostalgiaForInfinity
  #   2. rapidjson + pandas_ta importable in the freqtrade image
  #   3. 2-year backtest passes Sharpe > 1.4 / DD < 12% / PF > 1.4
  #   4. Paper-soak 7 days with ≥1 trade/day
  #   5. Operator verbal "GO" → flip dry_run=false and remove profile gate
  #
  # Shares the same Dockerfile.freqtrade as the main service. Uses a
  # separate sqlite trade DB (tradesv3_nfi.sqlite) and a separate
  # dry_run_wallet so paper P&L stays isolated. Listens on host 8090
  # to avoid colliding with the main freqtrade REST API on 8080.
  # ──────────────────────────────────────────────────────────────────────
  freqtrade-nfi:
    profiles: ["nfi"]
    build:
      context: .
      dockerfile: Dockerfile.freqtrade
    image: trading-bot/freqtrade:local
    container_name: freqtrade-nfi
    restart: unless-stopped
    mem_limit: 8g
    memswap_limit: 8g
    shm_size: 512m
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./user_data:/freqtrade/user_data
      - ./scripts:/freqtrade/scripts:ro
      - ./secrets:/run/secrets/trading-bot:ro
    # Loopback only — same convention as the main freqtrade.
    ports:
      - "127.0.0.1:8090:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # NFI X6 is CPU-bound (pandas_ta / talib); GPU not required.
      - COINBASE_KEY_FILE=${COINBASE_KEY_FILE:-/run/secrets/trading-bot/coinbase.json}
      - COINBASE_API_KEY=${COINBASE_API_KEY:-}
      - COINBASE_API_SECRET=${COINBASE_API_SECRET:-}
      - FREQTRADE__API_SERVER__USERNAME=${FREQTRADE_API_USER:-freqtrader}
      - FREQTRADE__API_SERVER__PASSWORD=${FREQTRADE_API_PASS:?FREQTRADE_API_PASS required}
      - FREQTRADE__API_SERVER__JWT_SECRET_KEY=${FREQTRADE_JWT_SECRET:?FREQTRADE_JWT_SECRET required}
      - FREQTRADE__API_SERVER__WS_TOKEN=${FREQTRADE_WS_TOKEN:?FREQTRADE_WS_TOKEN required}
      # CRITICAL: pin NFI's trade DB to its own sqlite file so it does NOT
      # share the main bot's `freqtrade` Postgres schema. The entrypoint
      # only builds a Postgres FREQTRADE__DB_URL when this env var is unset,
      # so this line is what keeps NFI isolated. Runbook §6.3.
      - FREQTRADE__DB_URL=sqlite:////freqtrade/user_data/tradesv3_nfi.sqlite
      # POSTGRES_* still required because the entrypoint references them
      # before honoring FREQTRADE__DB_URL — pass them through harmlessly.
      - POSTGRES_USER=${POSTGRES_USER:-tradebot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      - POSTGRES_DB=${POSTGRES_DB:-tradebot}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://127.0.0.1:8080/api/v1/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    entrypoint: ["python3", "/freqtrade/scripts/freqtrade_entrypoint.py"]
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade-nfi.log
      --config /freqtrade/user_data/strategies/nfi_x6_config.json
      --strategy NostalgiaForInfinityX6

  # ── vLLM with hot-swappable LoRA adapters (PROFILED OFF) ──────────────
  # Serves qwen3:30b as a base + 4 prose-role LoRAs (reflector / bull /
  # bear / arbiter). vLLM 0.5+ supports per-request adapter selection
  # (5-10 ms PCIe-fetch) which Ollama doesn't. Ollama keeps serving the
  # JSON-only roles (regime tagger, indicator selector) on 11434.
  #
  # OFF by default — `docker compose up` will NOT start this. Activate:
  #     bash scripts/bootstrap_vllm.sh
  # (or directly: `docker compose --profile vllm up -d vllm`)
  #
  # NOTE: the spec called for host port 8090, but freqtrade-nfi already
  # claims 8090 on loopback. Because both services are profile-gated
  # (`nfi` vs `vllm`) and only one runs at a time in normal operation,
  # we can keep 8090 here too — but documenting the collision in
  # docs/VLLM_SERVING.md so the operator doesn't run both profiles at
  # once without thinking. The container also exposes 8000 internally
  # (vLLM's OpenAI server default), so other compose services reach
  # vLLM at `http://vllm:8000`.
  #
  # IMPORTANT: vLLM/OpenAI image expects HF model ids, not Ollama tags.
  # We pull `Qwen/Qwen3-30B-A3B-Instruct-2507` into the HF cache below;
  # the trading-bot code still calls it "qwen3:30b" via VLLM_BASE_MODEL.
  # ──────────────────────────────────────────────────────────────────────
  vllm:
    profiles: ["vllm"]
    image: vllm/vllm-openai:latest
    container_name: vllm
    restart: unless-stopped
    runtime: nvidia
    shm_size: 16g
    mem_limit: 64g
    memswap_limit: 64g
    ipc: host
    # Loopback only — same convention as freqtrade / freqtrade-nfi.
    # See note above on the port-8090 collision with freqtrade-nfi.
    ports:
      - "127.0.0.1:8090:8000"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_HOST_IP=0.0.0.0
      # Where HF caches model weights. Persisted via a named volume so
      # we don't redownload 30 GB on every container restart.
      - HF_HOME=/cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/cache/huggingface/hub
    volumes:
      - vllm_cache:/cache/huggingface
      # Adapter store on the host — ModelForge writes promoted champions
      # here, and the operator (or a cron) calls /v1/load_lora_adapter
      # to register new ones without bouncing the container.
      - ./data/lora-adapters:/lora:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      # vLLM's /health on the OpenAI server (port 8000 inside container).
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s  # cold-start can be 3-5 min (weight load + JIT)
    command:
      - --model=${VLLM_HF_MODEL:-Qwen/Qwen3-30B-A3B-Instruct-2507}
      - --served-model-name=${VLLM_BASE_MODEL:-qwen3:30b}
      - --quantization=${VLLM_QUANTIZATION:-fp8}
      - --gpu-memory-utilization=${VLLM_GPU_MEM_UTIL:-0.45}
      - --max-model-len=${VLLM_MAX_MODEL_LEN:-8192}
      - --enable-lora
      - --max-loras=6
      - --max-lora-rank=32
      - --max-cpu-loras=12
      - --lora-modules
      - reflector=/lora/reflector-current
      - bull=/lora/bull-current
      - bear=/lora/bear-current
      - arbiter=/lora/arbiter-current

  # InfluxDB removed 2026-05-12: only consumer was Grafana, which was also
  # removed. Trade telemetry lives in TimescaleDB; circuit-breaker + LLM
  # state live in JSONL. No replacement needed.

  dashboard:
    build:
      context: ./user_data/dashboard
      dockerfile: Dockerfile
    container_name: dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      freqtrade:
        condition: service_started
    # Bind all interfaces — operator wants LAN (192.168.x) and Tailscale
    # (100.x CGNAT) access from other devices on their tailnet. The
    # require_mcp_key auth dependency still gates mutating endpoints
    # against non-trusted peers (defense-in-depth trusts loopback +
    # RFC1918 + Tailscale CGNAT). Previously P0-V loopback-only; operator
    # acknowledged the broader binding on 2026-05-11.
    ports:
      - "0.0.0.0:8081:8081"
    extra_hosts:
      # Lets the Ops tab probe host services (ollama 11434, hermes-mcp 8089,
      # hermes-dashboard 9119) from inside the container.
      - "host.docker.internal:host-gateway"
    volumes:
      # Mount user_data so the dashboard can read evolution.json and static
      # assets, and (RW) write config.json when the operator updates regime
      # params from /ops (validated + atomic + backed-up). Trade data is
      # read from TimescaleDB, not files.
      - ./user_data:/freqtrade/user_data
      # Read-only mount of the stocks subsystem so /api/ops/stocks can
      # surface shark equity + wheel positions in the unified dashboard.
      - ./stocks:/freqtrade/stocks:ro
      # Read-only view of host /tmp so the dashboard can see the LLM
      # circuit-breaker state files (/tmp/shark-cb-*.json) and the
      # Ollama health probe output (/tmp/ollama-health.json) that the
      # host-side shark process + ollama_health cron write to.
      - /tmp:/host-tmp:ro
    environment:
      - USER_DATA_ROOT=/freqtrade/user_data
      - STOCKS_ROOT=/freqtrade/stocks
      # Shark LLM provider — surfaced on the Stocks card so the operator can
      # see at a glance whether stocks is on local Ollama (default) or paid
      # Anthropic. Read-only display; container does not call the LLM.
      - SHARK_LLM_PROVIDER=${SHARK_LLM_PROVIDER:-ollama}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-hermes3:70b}
      # Point to the host /tmp view so /api/ops/{circuit_breakers,ollama_health}
      # can see what shark + the host-side ollama_health cron write.
      - SHARK_CB_DIR=/host-tmp
      - OLLAMA_HEALTH_STATUS_FILE=/host-tmp/ollama-health.json
      # Animation gate — operator can set DASHBOARD_EFFECTS=0 to drop the
      # decorative effects.js layer for a data-first display.
      - DASHBOARD_EFFECTS=${DASHBOARD_EFFECTS:-1}
      - DASHBOARD_PAIRS=${DASHBOARD_PAIRS:-BTC/USD,ETH/USD,SOL/USD}
      # Cross-network bridge to mf-api (model-forge_default network).
      # mf-api binds 0.0.0.0:8000 on the host so host.docker.internal:8000
      # is the canonical access path from the dashboard container — both
      # services are on different docker networks. Auth key is sourced
      # from the trading-bot .env (which now mirrors mf-api's value).
      - MODELFORGE_API_URL=${MODELFORGE_API_URL:-http://host.docker.internal:8000}
      - MODELFORGE_API_KEY=${MODELFORGE_API_KEY:-}
      - DASHBOARD_TIMEFRAME=${DASHBOARD_TIMEFRAME:-5m}
      - DASHBOARD_WS_INTERVAL_SEC=${DASHBOARD_WS_INTERVAL_SEC:-30}
      # Pass parts; data_sources._resolve_dsn() URL-encodes the password.
      - POSTGRES_USER=${POSTGRES_USER:-tradebot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      - POSTGRES_DB=${POSTGRES_DB:-tradebot}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      # Reach freqtrade by service name on the compose network
      - FREQTRADE_API_URL=http://freqtrade:8080
      - FREQTRADE_API_USER=${FREQTRADE_API_USER:-freqtrader}
      - FREQTRADE_API_PASS=${FREQTRADE_API_PASS:-}
      # Hermes MCP key — gates mutating tools (pause/resume/trigger_evolution)
      # via the /api/ops/mcp/* shim. Read-only tools work without it.
      - HERMES_MCP_KEY=${HERMES_MCP_KEY:-}
      # Slack incoming webhook — used by /api/ops/slack_preview and any
      # future dashboard-driven Slack posts. Same value the bot itself uses.
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys;sys.exit(0 if urllib.request.urlopen(\"http://127.0.0.1:8081/api/pairs\", timeout=3).status==200 else 1)'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Grafana removed 2026-05-12 — unused; dashboard is the SSOT UI.

volumes:
  postgres_data:
  # Persists the HF model cache for vLLM — first pull is ~30 GB, we
  # don't want to redo it on every container restart.
  vllm_cache:
