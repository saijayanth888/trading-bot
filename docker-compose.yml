services:
  postgres:
    # P0-X: pin TimescaleDB to the exact tag we tested with
    # (latest-pg16 resolved to 2.26.4-pg16 on 2026-04-28). Bump
    # deliberately and re-run the schema migration tests.
    image: timescale/timescaledb:2.26.4-pg16
    container_name: tradebot-postgres
    restart: unless-stopped
    mem_limit: 2g
    memswap_limit: 2g
    shm_size: 256m
    # Port 5434 to avoid conflicting with ModelForge's mf-postgres on 5433.
    # P0-V: bind to loopback only — nothing on the LAN should reach Postgres.
    ports:
      - "127.0.0.1:5434:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-tradebot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tradebot-change-me}
      - POSTGRES_DB=${POSTGRES_DB:-tradebot}
      - TIMESCALEDB_TELEMETRY=off
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # init.d runs once on first startup — creates the freqtrade DB and
      # enables the timescaledb extension on both DBs.
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tradebot} -d ${POSTGRES_DB:-tradebot}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── freqtrade decommissioned 2026-05-14 ──────────────────────────────
  # The `freqtrade` and `freqtrade-nfi` services were removed from this
  # compose file as part of the post-cutover cleanup. Quanta-core is the
  # live engine. See memory `freqtrade_decommissioned` and
  # `vllm_machine_crash_2026_05_14` for context. Strategy files,
  # entrypoint script, and Dockerfile.freqtrade are queued for deletion
  # in a follow-up phase but kept on disk in case any rollback is needed.
  # ──────────────────────────────────────────────────────────────────────

  # ── vLLM with hot-swappable LoRA adapters (PROFILED OFF) ──────────────
  # Serves qwen3:30b as a base + 4 prose-role LoRAs (reflector / bull /
  # bear / arbiter). vLLM 0.5+ supports per-request adapter selection
  # (5-10 ms PCIe-fetch) which Ollama doesn't. Ollama keeps serving the
  # JSON-only roles (regime tagger, indicator selector) on 11434.
  #
  # OFF by default — `docker compose up` will NOT start this. Activate:
  #     bash scripts/bootstrap_vllm.sh
  # (or directly: `docker compose --profile vllm up -d vllm`)
  #
  # Host port 8090 is now exclusively vLLM's (freqtrade-nfi removed
  # 2026-05-14). The container also exposes 8000 internally (vLLM's
  # OpenAI server default), so other compose services reach vLLM at
  # `http://vllm:8000`.
  #
  # IMPORTANT: vLLM/OpenAI image expects HF model ids, not Ollama tags.
  # We pull `Qwen/Qwen3-30B-A3B-Instruct-2507` into the HF cache below;
  # the trading-bot code still calls it "qwen3:30b" via VLLM_BASE_MODEL.
  # ──────────────────────────────────────────────────────────────────────
  vllm:
    profiles: ["vllm"]
    image: vllm/vllm-openai:latest
    container_name: vllm
    # 2026-05-14: was `unless-stopped`. The bring-up at 14:46 hit
    # NV_ERR_NO_MEMORY during CUDA-graph profiling and the auto-restart
    # loop dragged the host into unified-memory exhaustion → power-cycle
    # at 14:50. See memory `vllm_machine_crash_2026_05_14`. Until the
    # ollama-coexistence question is settled, vLLM only starts when
    # `bootstrap_vllm.sh` is run manually.
    restart: "no"
    runtime: nvidia
    shm_size: 16g
    mem_limit: 64g
    memswap_limit: 64g
    ipc: host
    # Loopback only — same convention as freqtrade / freqtrade-nfi.
    # See note above on the port-8090 collision with freqtrade-nfi.
    ports:
      - "127.0.0.1:8090:8000"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_HOST_IP=0.0.0.0
      # Where HF caches model weights. Persisted via a named volume so
      # we don't redownload 30 GB on every container restart.
      - HF_HOME=/cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/cache/huggingface/hub
      # 2026-05-14: disable CUDA-graph memory profiling. With profiling
      # ON (vLLM 0.21 default), the engine reserves 2.16 GiB up-front
      # from the KV-cache budget — on a GB10 unified-memory system this
      # left ZERO room for KV cache at gpu_memory_utilization=0.45 and
      # the engine refused to start. Disable per vLLM's own suggestion
      # in the failure message.
      - VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=0
    volumes:
      - vllm_cache:/cache/huggingface
      # Adapter store on the host — ModelForge writes promoted champions
      # here, and the operator (or a cron) calls /v1/load_lora_adapter
      # to register new ones without bouncing the container.
      - ./data/lora-adapters:/lora:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      # vLLM's /health on the OpenAI server (port 8000 inside container).
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s  # cold-start can be 3-5 min (weight load + JIT)
    command:
      - --model=${VLLM_HF_MODEL:-Qwen/Qwen3-30B-A3B-Instruct-2507}
      - --served-model-name=${VLLM_BASE_MODEL:-qwen3:30b}
      - --quantization=${VLLM_QUANTIZATION:-fp8}
      # 2026-05-14: rolled back from the 0.65 that crashed the host to
      # 0.30. On GB10 unified memory (121 GiB shared between RAM + GPU),
      # 0.65 == ~78 GiB which collides with ollama's resident models
      # (hermes3:8b + 70B ≈ 45 GiB) and kernel slab. 0.30 ≈ 36 GiB is
      # the safe ceiling while ollama is co-resident. Bump only after
      # picking a hosting model (see vllm_machine_crash_2026_05_14 →
      # "Open structural decisions"). Override per-boot with
      # VLLM_GPU_MEM_UTIL env var if you intentionally want more.
      - --gpu-memory-utilization=${VLLM_GPU_MEM_UTIL:-0.30}
      # 2026-05-14: 8192 → 4096. Trading prose roles (bull/bear/arbiter/
      # reflector) emit 200-500 token responses; 4K context handles the
      # full prompt + features + multi-message debate scrollback with
      # headroom. Halves the per-request KV cache footprint.
      - --max-model-len=${VLLM_MAX_MODEL_LEN:-4096}
      - --enable-lora
      - --max-loras=6
      - --max-lora-rank=32
      - --max-cpu-loras=12
      # NOTE 2026-05-14: --lora-modules removed for first boot. The 4
      # adapter dirs (/lora/{reflector,bull,bear,arbiter}-current) don't
      # exist yet — Sunday's ModelForge training is the first run that
      # produces them. After Sunday, the publish_adapter_to_ollama
      # workflow loads each adapter via POST /v1/load_lora_adapter
      # without restarting vLLM. Re-add the static --lora-modules lines
      # if/when you want adapter preloading at boot time.

  # InfluxDB removed 2026-05-12: only consumer was Grafana, which was also
  # removed. Trade telemetry lives in TimescaleDB; circuit-breaker + LLM
  # state live in JSONL. No replacement needed.

  dashboard:
    build:
      context: ./user_data/dashboard
      dockerfile: Dockerfile
    container_name: dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Bind all interfaces — operator wants LAN (192.168.x) and Tailscale
    # (100.x CGNAT) access from other devices on their tailnet. The
    # require_mcp_key auth dependency still gates mutating endpoints
    # against non-trusted peers (defense-in-depth trusts loopback +
    # RFC1918 + Tailscale CGNAT). Previously P0-V loopback-only; operator
    # acknowledged the broader binding on 2026-05-11.
    ports:
      - "0.0.0.0:8081:8081"
    extra_hosts:
      # Lets the Ops tab probe host services (ollama 11434, hermes-mcp 8089,
      # hermes-dashboard 9119) from inside the container.
      - "host.docker.internal:host-gateway"
    volumes:
      # Mount user_data so the dashboard can read evolution.json and static
      # assets, and (RW) write config.json when the operator updates regime
      # params from /ops (validated + atomic + backed-up). Trade data is
      # read from TimescaleDB, not files.
      - ./user_data:/freqtrade/user_data
      # Read-only mount of the stocks subsystem so /api/ops/stocks can
      # surface shark equity + wheel positions in the unified dashboard.
      - ./stocks:/freqtrade/stocks:ro
      # Data-out-of-repo migration (2026-05-13): shark memory + wheel state
      # live at /home/saijayanthai/Documents/.dgx-train/shark/, NOT in the
      # repo tree. On the host these locations are symlinks back, so any
      # code that uses Path(__file__).parents[N] / "memory" still works.
      # Inside the container we OVERLAY the new home onto the legacy paths
      # so the same path-construction code reads the migrated data without
      # any code changes. Read-only because the dashboard never writes
      # these files — shark, wheel, and the Hermes crons (on the host) do.
      - /home/saijayanthai/Documents/.dgx-train/shark/memory:/freqtrade/stocks/memory:ro
      - /home/saijayanthai/Documents/.dgx-train/shark/wheel-state:/freqtrade/stocks/wheel/state:ro
      # Read-only view of host /tmp so the dashboard can see the LLM
      # circuit-breaker state files (/tmp/shark-cb-*.json) and the
      # Ollama health probe output (/tmp/ollama-health.json) that the
      # host-side shark process + ollama_health cron write to.
      - /tmp:/host-tmp:ro
      # frontend-v4 SPA dist — bind-mounted so /v4/* serves the React 19 +
      # shadcn operator console (see frontend-v4/). Rebuild on host with
      # `cd frontend-v4 && npm run build`; no dashboard restart needed
      # because FastAPI StaticFiles re-reads from disk on each request.
      # Path inside container matches v4_routes.py:V4_DIST resolution.
      - ./frontend-v4/dist:/frontend-v4/dist:ro
    environment:
      - USER_DATA_ROOT=/freqtrade/user_data
      - STOCKS_ROOT=/freqtrade/stocks
      # Shark LLM provider — surfaced on the Stocks card so the operator can
      # see at a glance whether stocks is on local Ollama (default) or paid
      # Anthropic. Read-only display; container does not call the LLM.
      - SHARK_LLM_PROVIDER=${SHARK_LLM_PROVIDER:-ollama}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-hermes3:70b}
      # Point to the host /tmp view so /api/ops/{circuit_breakers,ollama_health}
      # can see what shark + the host-side ollama_health cron write.
      - SHARK_CB_DIR=/host-tmp
      - OLLAMA_HEALTH_STATUS_FILE=/host-tmp/ollama-health.json
      # Animation gate — operator can set DASHBOARD_EFFECTS=0 to drop the
      # decorative effects.js layer for a data-first display.
      - DASHBOARD_EFFECTS=${DASHBOARD_EFFECTS:-1}
      # Post-cutover: tells /api/mode which engine is active. Defaults to
      # legacy freqtrade probe when unset.
      - LIVE_ENGINE_MODE=${LIVE_ENGINE_MODE:-}
      - DASHBOARD_PAIRS=${DASHBOARD_PAIRS:-BTC/USD,ETH/USD,SOL/USD}
      # Cross-network bridge to mf-api (model-forge_default network).
      # mf-api binds 0.0.0.0:8000 on the host so host.docker.internal:8000
      # is the canonical access path from the dashboard container — both
      # services are on different docker networks. Auth key is sourced
      # from the trading-bot .env (which now mirrors mf-api's value).
      - MODELFORGE_API_URL=${MODELFORGE_API_URL:-http://host.docker.internal:8000}
      - MODELFORGE_API_KEY=${MODELFORGE_API_KEY:-}
      - DASHBOARD_TIMEFRAME=${DASHBOARD_TIMEFRAME:-5m}
      - DASHBOARD_WS_INTERVAL_SEC=${DASHBOARD_WS_INTERVAL_SEC:-30}
      # Pass parts; data_sources._resolve_dsn() URL-encodes the password.
      - POSTGRES_USER=${POSTGRES_USER:-tradebot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      - POSTGRES_DB=${POSTGRES_DB:-tradebot}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      # FREQTRADE_API_URL/USER/PASS removed 2026-05-14 (freqtrade
      # decommissioned). The `data_sources.fetch_freqtrade_*` calls
      # in dashboard code are slated for removal in Phase 2. Until
      # then, those routes will return errors after the next dashboard
      # restart.
      # Hermes MCP key — gates mutating tools (pause/resume/trigger_evolution)
      # via the /api/ops/mcp/* shim. Read-only tools work without it.
      - HERMES_MCP_KEY=${HERMES_MCP_KEY:-}
      # Slack incoming webhook — used by /api/ops/slack_preview and any
      # future dashboard-driven Slack posts. Same value the bot itself uses.
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys;sys.exit(0 if urllib.request.urlopen(\"http://127.0.0.1:8081/api/pairs\", timeout=3).status==200 else 1)'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Grafana removed 2026-05-12 — unused; dashboard is the SSOT UI.

  quanta-core:
    # V4 shadow / live runner. Tonight: SHADOW only — writes decisions
    # to quanta_schema.decisions without placing orders. Phase 3 of the
    # cutover plan wires order placement when LIVE_ENGINE_MODE=live.
    build:
      context: .
      dockerfile: Dockerfile.quanta_core
    container_name: quanta-core
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      # Reach the dashboard container's regime endpoint from inside this
      # one — same network bridge the dashboard uses for /tmp + ollama.
      - "host.docker.internal:host-gateway"
    environment:
      - LIVE_ENGINE_MODE=${LIVE_ENGINE_MODE:-shadow}
      - SHADOW_CYCLE_SEC=${SHADOW_CYCLE_SEC:-300}
      # When set to a valid regime label (trending_up | trending_down |
      # mean_reverting | high_volatility), bypasses the live regime feed.
      # Use to force a strategy to fire entries for end-to-end testing
      # without waiting for a natural regime flip. CLEAR THIS for real ops.
      - REGIME_OVERRIDE=${REGIME_OVERRIDE:-}
      # Per-component env (keyword DSN) — password may contain '@', which
      # breaks the postgres:// URL parser. Runner composes a key=val DSN.
      - POSTGRES_USER=${POSTGRES_USER:-tradebot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      - POSTGRES_DB=${POSTGRES_DB:-tradebot}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      # Reach the dashboard on the compose network (same docker network);
      # the host.docker.internal route from extra_hosts is unreliable.
      - REGIME_FEED_URL=http://dashboard:8081/api/ops/regime
      - COINBASE_REST_BASE=https://api.exchange.coinbase.com

volumes:
  postgres_data:
  # Persists the HF model cache for vLLM — first pull is ~30 GB, we
  # don't want to redo it on every container restart.
  vllm_cache:
