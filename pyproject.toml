[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "quanta-core"
version = "0.1.0"
description = "Quanta Core v4 — agents, debate orchestrator, risk + execution"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Quanta Core" }]
dependencies = [
    "pydantic>=2.6,<3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.1",
    "pytest-asyncio>=0.23",
    "ruff>=0.5",
    "mypy>=1.10",
]

[tool.hatch.build.targets.wheel]
packages = ["src/quanta_core"]

# ---------------------------------------------------------------------------
# Ruff
# ---------------------------------------------------------------------------
[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests"]
extend-exclude = [
    "user_data",
    "stocks",
    "scripts",
    "hermes-mcp",
    "hermes_patches",
    "tests/conftest.py",
    "tests/test_*.py",
]

[tool.ruff.lint]
select = [
    "E", "F", "W",  # pycodestyle + pyflakes
    "I",            # isort
    "B",            # bugbear
    "UP",           # pyupgrade
    "T201",         # print
    "RET",          # return
    "SIM",          # simplify
    "PIE",          # pie
    "PERF",         # perflint
]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]

# ---------------------------------------------------------------------------
# Mypy
# ---------------------------------------------------------------------------
[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_return_any = true
disallow_any_generics = true
no_implicit_reexport = true
show_error_codes = true
files = ["src/quanta_core/agents", "tests/agents"]

# ---------------------------------------------------------------------------
# Pytest — restricted to tests/agents/ so wave-2 work doesn't import the
# legacy freqtrade/dashboard test fixtures.
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
testpaths = ["tests/agents"]
asyncio_mode = "auto"
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
]
markers = []

# ---------------------------------------------------------------------------
# Coverage
# ---------------------------------------------------------------------------
[tool.coverage.run]
source = ["src/quanta_core/agents"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
    "\\.\\.\\.",
]
show_missing = true
skip_covered = false
