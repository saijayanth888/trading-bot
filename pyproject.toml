[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "quanta-core"
version = "0.4.0"
description = "Quanta Core v4 — exchange adapters, strategy framework, execution engine."
requires-python = ">=3.12"
license = { text = "Proprietary" }
authors = [{ name = "sai jayanth", email = "saijayanth532@gmail.com" }]
dependencies = [
    "alpaca-py>=0.43.0",
    "coinbase-advanced-py>=1.8.0",
    "anyio>=4.4.0",
    "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "vcrpy>=8.0",
    "hypothesis>=6.100",
    "ruff>=0.5",
    "mypy>=1.10",
]

[tool.hatch.build.targets.wheel]
packages = ["src/quanta_core"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E", "F", "W",     # pyflakes + pycodestyle
    "I",                # isort
    "UP",               # pyupgrade
    "B",                # bugbear
    "T20",              # no print
    "ASYNC",            # async pitfalls
    "RUF",              # ruff-specific
]
ignore = ["E501"]  # line length handled by formatter

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["B", "ASYNC"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
namespace_packages = true
explicit_package_bases = true
mypy_path = "src"

[[tool.mypy.overrides]]
module = ["coinbase.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
]
markers = [
    "vcr: marks tests that replay cassettes (no network)",
]

[tool.coverage.run]
source = ["src/quanta_core/exchanges"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "@(abc\\.)?abstractmethod",
]
fail_under = 85
show_missing = true
