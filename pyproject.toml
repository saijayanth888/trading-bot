# Quanta Core V4 — root pyproject.
#
# Canonical config for the new ``src/quanta_core/`` tree. The legacy stack
# (``user_data/``, ``stocks/``) is not affected: ruff and mypy are scoped to
# ``src/`` + ``tests/`` (the new V4 test tree only — legacy tests live in
# ``tests/test_*.py`` at root and predate ruff-strict / pytest-config).
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "quanta-core"
version = "0.4.0.dev0"
description = "Quanta Core V4 — direct-to-broker trading + research stack"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "sai jayanth", email = "saijayanth532@gmail.com" }]
dependencies = [
    "anyio>=4.4.0",
    "pydantic>=2.6,<3",
    "pydantic-settings>=2.2,<3",
    "sqlalchemy>=2.0,<3",
    "psycopg[binary]>=3.1,<4",
    "structlog>=24.1",
    "httpx>=0.27.0",
    "safetensors>=0.4",
    "alpaca-py>=0.43.0",
    "coinbase-advanced-py>=1.8.0",
    "numpy>=1.26",
    "pandas>=2.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-asyncio>=0.23",
    "hypothesis>=6.100",
    "freezegun>=1.5",
    "ruff>=0.5",
    "mypy>=1.10",
    "vcrpy>=8.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/quanta_core"]

# ---------------------------------------------------------------------------
# Ruff
# ---------------------------------------------------------------------------
[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests"]
extend-exclude = [
    "user_data",
    "stocks",
    "scripts",
    "hermes-mcp",
    "private",
    "docs",
]

[tool.ruff.lint]
select = [
    "E", "F", "W",  # pycodestyle + pyflakes
    "I",            # isort
    "B",            # bugbear
    "UP",           # pyupgrade
    "T20",          # no print
    "ASYNC",        # async lints
    "RET",          # return
    "SIM",          # simplify
    "PIE",          # pie
    "PERF",         # perflint
    "C4",           # comprehensions
    "PT",           # pytest
    "RUF",          # ruff-specific
]
ignore = [
    "E501",  # line length handled by formatter
    "B008",  # function call as default arg — Path.home() etc
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "T20", "PT011", "B", "ASYNC"]  # asserts/print/broad raises/bugbear/async ok in tests

# ---------------------------------------------------------------------------
# Mypy
# ---------------------------------------------------------------------------
[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
warn_unused_configs = true
warn_redundant_casts = true
warn_return_any = true
disallow_any_generics = true
no_implicit_reexport = true
show_error_codes = true
files = ["src/quanta_core"]
namespace_packages = true
explicit_package_bases = true
mypy_path = "src"
# legacy code lives outside src/ — never type-checked from here.

[[tool.mypy.overrides]]
module = ["sqlalchemy.*", "psycopg.*", "structlog.*", "vcr.*", "safetensors.*", "torch.*", "coinbase.*", "alpaca.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

# ---------------------------------------------------------------------------
# Pytest
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
testpaths = ["src/quanta_core", "tests"]
asyncio_mode = "auto"
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
]
markers = [
    "slow: long-running tests (vcr replays, e2e)",
    "integration: tests that require a real Postgres",
    "anyio: anyio-driven async test (used by live/)",
    "vcr: marks tests that replay cassettes (no network)",
    "gpu: requires CuPy/PyTorch with a CUDA device (skipped by default)",
]

# ---------------------------------------------------------------------------
# Coverage
# ---------------------------------------------------------------------------
[tool.coverage.run]
source = ["src/quanta_core"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
    "\\.\\.\\.",
    "@(abc\\.)?abstractmethod",
]
show_missing = true
skip_covered = false
