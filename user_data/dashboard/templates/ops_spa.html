<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#08080c" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/css/quanta.css?v=20260512-train-prod-ready" />

  <!-- Theme + density boot (B-5) — seed <html> from localStorage BEFORE
       React mounts so the operator's prior selection (Control / Geist /
       Bloomberg, Compact / Default / Roomy) survives navigation between
       legacy /ops and the SPA without a flash of the wrong palette. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("quanta.theme") || "control";
        var d = localStorage.getItem("quanta.density") || "default";
        document.documentElement.setAttribute("data-theme", t);
        document.documentElement.setAttribute("data-density", d);
      } catch (e) { /* localStorage may be unavailable */ }
    })();
  </script>

  <!-- React 18.3.1 (pinned UMD) -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
</head>

  <script src="/static/js/ops_spa.js?v=20260512-train-prod-ready"></script>
</body>
</html>
